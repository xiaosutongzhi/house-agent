### model
model_name_or_path: /mnt/nas/szm/model/models--Qwen--Qwen2.5-0.5B
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: lora
quantization_bit: 4
lora_rank: 16
lora_target: all

### dataset
dataset: house_agent_schema
template: qwen
cutoff_len: 1024
max_samples: 50000
preprocessing_num_workers: 8
dataloader_num_workers: 2

### output
output_dir: saves/qwen25-0_5b/qlora/sft_house_agent_schema
logging_steps: 10
save_steps: 500
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: none

### train
per_device_train_batch_size: 8
gradient_accumulation_steps: 8
learning_rate: 2.0e-4
num_train_epochs: 3.0
lr_scheduler_type: cosine
warmup_ratio: 0.05
fp16: true
gradient_checkpointing: true

